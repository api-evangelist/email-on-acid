name: Email on Acid
description: Email on Acid (now branded as Mailgun Inspect) is an email testing and
  pre-deployment quality assurance platform with a REST API for rendering email previews
  across 100+ email clients and devices, checking accessibility compliance (WCAG 2.2),
  validating HTML/CSS compatibility, running spam filter analysis, and automating
  pre-send email testing workflows via HTTP Basic Authentication.
